name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build and publish wheels for Linux, macOS, and Windows
  release:
    name: Release
    runs-on: ${{ matrix.os }}
    environment: publishing
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Build and publish
        uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --non-interactive --skip-existing --username __token__ --password ${{ secrets.PYPI_API_TOKEN }}

  # Build and publish source distribution (sdist)
  sdist:
    runs-on: ubuntu-latest
    environment: publishing
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          
      - name: Upload sdist
        # Use 'run' to ensure shell expansion of 'dist/*' works correctly
        run: maturin upload --non-interactive --skip-existing --username __token__ --password ${{ secrets.PYPI_API_TOKEN }} dist/*